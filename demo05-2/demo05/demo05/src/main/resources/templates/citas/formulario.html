<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agendar Cita - Clínica Tecsup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layout/navbar :: menu}"></div>

<nav class="navbar navbar-expand-lg mb-2">
    <div class="container">
        <a class="navbar-brand fw-bold text-secondary" href="/">🏥 Gestión Clínica</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-primary" th:href="@{/pacientes}">Pacientes</a>
            <a class="nav-link active text-primary fw-bold" th:href="@{/citas}">Citas Médicas</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4 border-0">
                <h4 class="text-center mb-4 text-primary">Agendar Nueva Cita</h4>

                <form th:action="@{/citas/guardar}" th:object="${cita}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Seleccionar Paciente</label>
                        <select th:field="*{paciente}" class="form-select" required>
                            <option value="">-- Seleccione un paciente --</option>
                            <option th:each="p : ${listaPacientes}"
                                    th:value="${p.id}"
                                    th:text="${p.nombre + ' ' + p.apellido}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Seleccionar Médico</label>
                        <select th:field="*{medico}" class="form-select" required>
                            <option value="">-- Seleccione un médico --</option>
                            <option th:each="m : ${listaMedicos}"
                                    th:value="${m.id}"
                                    th:text="${m.nombre}"></option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Fecha</label>
                            <input type="date" th:field="*{fecha}" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Hora</label>
                            <input type="time" th:field="*{hora}" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Estado de la Cita</label>
                        <select th:field="*{estado}" class="form-select">
                            <option value="Pendiente">Pendiente</option>
                            <option value="Atendida">Atendida</option>
                            <option value="Cancelada">Cancelada</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/citas}" class="btn btn-outline-secondary">Volver</a>
                        <button type="submit" class="btn btn-primary px-4">Confirmar Registro</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
